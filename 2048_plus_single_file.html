<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>2048 升级版</title>
<style>
:root{--panel:rgba(15,23,42,.9);--panel2:rgba(30,41,59,.82);--border:rgba(148,163,184,.18);--text:#f8fafc;--muted:#94a3b8;--accent:#38bdf8;--board:#1e293b;--cell:rgba(148,163,184,.12);--shadow:0 24px 70px rgba(0,0,0,.35)}*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(56,189,248,.14),transparent 34%),linear-gradient(160deg,#111827,#020617);padding:20px}button,select,input{font:inherit}.app{width:min(1180px,100%);margin:auto;display:grid;grid-template-columns:290px minmax(320px,1fr) 310px;gap:18px;align-items:start}.panel{background:var(--panel);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}.sidebar{padding:18px;display:flex;flex-direction:column;gap:16px}.title{margin:0;font-size:34px;line-height:1}.subtitle{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.6}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat,.section{padding:12px;border-radius:14px;background:var(--panel2);border:1px solid rgba(148,163,184,.12)}.label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.value{font-size:24px;font-weight:800}.section h3{margin:0 0 12px;font-size:15px}.control-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:6px}.field label{color:var(--muted);font-size:12px}select,input{width:100%;min-height:40px;border:1px solid var(--border);border-radius:10px;color:var(--text);background:#0f172a;padding:8px 10px}.btn{min-height:42px;border:1px solid var(--border);border-radius:11px;color:var(--text);background:#1e293b;cursor:pointer;transition:.15s}.btn:hover{background:#334155}.btn:active{transform:scale(.97)}.btn.primary{background:linear-gradient(135deg,#0284c7,#0ea5e9)}.btn.success{background:rgba(22,163,74,.28)}.btn:disabled{opacity:.45;cursor:not-allowed}.game-panel{padding:18px}.top-bar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}.badge{padding:8px 12px;border-radius:999px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.18);font-size:13px}.badge.active{background:rgba(245,158,11,.18);animation:pulse .5s ease}@keyframes pulse{from{transform:scale(.94)}to{transform:scale(1)}}.board-wrap{position:relative;width:min(100%,620px);margin:auto;aspect-ratio:1}.board{position:relative;width:100%;height:100%;padding:12px;border-radius:18px;background:var(--board);touch-action:none;overflow:hidden}.grid,.tiles{position:absolute;inset:12px;display:grid;gap:10px}.cell{border-radius:12px;background:var(--cell)}.tile{display:flex;align-items:center;justify-content:center;border-radius:12px;font-weight:900;box-shadow:inset 0 -4px 0 rgba(0,0,0,.08),0 6px 16px rgba(0,0,0,.16);animation:spawn .16s ease}@keyframes spawn{from{transform:scale(.55);opacity:.2}to{transform:scale(1);opacity:1}}.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.72);z-index:10}.overlay.hidden{display:none}.overlay-card{width:min(320px,88%);padding:22px;border-radius:18px;background:rgba(15,23,42,.96);text-align:center}.overlay-card p{color:var(--muted);line-height:1.6}.particle-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:8}.particle{position:absolute;width:8px;height:8px;border-radius:50%;animation:particle .7s ease-out forwards}@keyframes particle{to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}.hint{margin:14px 0 0;color:var(--muted);font-size:13px;text-align:center;line-height:1.6}.list{display:grid;gap:8px;max-height:300px;overflow:auto}.item{padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.66);border:1px solid rgba(148,163,184,.1);font-size:13px}.achievement.locked{opacity:.48}.achievement.unlocked{border-color:rgba(74,222,128,.25)}.leader{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center}.leader span:last-child{color:var(--accent);font-weight:700}.progress{height:7px;border-radius:999px;background:rgba(148,163,184,.12);overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:linear-gradient(90deg,#0ea5e9,#22c55e)}.status{min-height:22px;color:var(--accent);font-size:13px}.daily{color:var(--muted);font-size:13px;line-height:1.7}@media(max-width:980px){.app{grid-template-columns:1fr 1.2fr}.right{grid-column:1/span 2}}@media(max-width:720px){body{padding:12px}.app{display:flex;flex-direction:column}.game-panel{order:1}.left{order:2}.right{order:3}}
</style>
</head>
<body>
<main class="app">
<aside class="panel sidebar left">
<header><h1 class="title">2048 升级版</h1><p class="subtitle">多棋盘、连击、成就、每日挑战、撤销、皮肤、排行榜、音效与粒子动画。</p></header>
<div class="stats"><div class="stat"><span class="label">分数</span><strong class="value" id="score">0</strong></div><div class="stat"><span class="label">最高分</span><strong class="value" id="best">0</strong></div><div class="stat"><span class="label">最大方块</span><strong class="value" id="maxTile">2</strong></div><div class="stat"><span class="label">最高连击</span><strong class="value" id="bestCombo">0</strong></div></div>
<section class="section"><h3>游戏设置</h3><div class="control-grid"><div class="field"><label>棋盘尺寸</label><select id="sizeSelect"><option value="3">3 × 3</option><option value="4" selected>4 × 4</option><option value="5">5 × 5</option><option value="6">6 × 6</option></select></div><div class="field"><label>皮肤</label><select id="skinSelect"><option value="classic">经典</option><option value="ocean">海洋</option><option value="forest">森林</option><option value="neon">霓虹</option></select></div></div><div class="control-grid" style="margin-top:10px"><button class="btn primary" id="newGameBtn">新游戏</button><button class="btn" id="undoBtn">撤销一步</button><button class="btn success" id="dailyBtn">每日挑战</button><button class="btn" id="soundBtn">音效：开</button></div></section>
<section class="section"><h3>排行榜登记</h3><div class="field"><label>玩家名</label><input id="playerName" maxlength="12" placeholder="输入昵称"></div><button class="btn primary" id="submitScoreBtn" style="width:100%;margin-top:10px">提交当前成绩</button></section>
<div class="status" id="status">使用方向键、WASD 或滑动开始。</div>
</aside>
<section class="panel game-panel"><div class="top-bar"><div class="badge" id="modeBadge">普通模式 · 4×4</div><div class="badge" id="comboBadge">连击 ×0</div></div><div class="board-wrap"><div class="board" id="board"><div class="grid" id="grid"></div><div class="tiles" id="tiles"></div><div class="particle-layer" id="particleLayer"></div><div class="overlay hidden" id="overlay"><div class="overlay-card"><h2 id="overlayTitle">游戏结束</h2><p id="overlayText"></p><button class="btn primary" id="overlayRestart">再来一局</button></div></div></div></div><p class="hint">连续有效合并会提升连击倍率；未发生合并则连击清零。每日挑战采用当天固定随机序列。</p></section>
<aside class="panel sidebar right"><section class="section"><h3>每日挑战</h3><div class="daily" id="dailyInfo"></div><div class="progress"><span id="dailyProgress" style="width:0"></span></div></section><section class="section"><h3>成就</h3><div class="list" id="achievementList"></div></section><section class="section"><h3>本地排行榜</h3><div class="list" id="leaderboard"></div></section></aside>
</main>
<script>
"use strict";
const STORE={BEST:"p2048_best",COMBO:"p2048_combo",BOARD:"p2048_board",ACH:"p2048_ach",SKIN:"p2048_skin",SOUND:"p2048_sound"};
const SKINS={classic:{board:"#1e293b",cell:"rgba(148,163,184,.12)",accent:"#38bdf8",tiles:{2:"#eee4da",4:"#ede0c8",8:"#f2b179",16:"#f59563",32:"#f67c5f",64:"#f65e3b",128:"#edcf72",256:"#edcc61",512:"#edc850",1024:"#edc53f",2048:"#edc22e"}},ocean:{board:"#0c4a6e",cell:"rgba(186,230,253,.14)",accent:"#67e8f9",tiles:{2:"#cffafe",4:"#a5f3fc",8:"#67e8f9",16:"#22d3ee",32:"#06b6d4",64:"#0891b2",128:"#0e7490",256:"#155e75",512:"#164e63",1024:"#0c4a6e",2048:"#083344"}},forest:{board:"#14532d",cell:"rgba(187,247,208,.12)",accent:"#4ade80",tiles:{2:"#dcfce7",4:"#bbf7d0",8:"#86efac",16:"#4ade80",32:"#22c55e",64:"#16a34a",128:"#15803d",256:"#166534",512:"#14532d",1024:"#0f3d24",2048:"#052e16"}},neon:{board:"#2b1458",cell:"rgba(216,180,254,.12)",accent:"#e879f9",tiles:{2:"#f5d0fe",4:"#f0abfc",8:"#e879f9",16:"#d946ef",32:"#c026d3",64:"#a21caf",128:"#86198f",256:"#701a75",512:"#581c87",1024:"#4c1d95",2048:"#312e81"}}};
const ACH=[{id:"first",t:"初次合并",d:"完成第一次合并",f:s=>s.merges>=1},{id:"128",t:"小有成就",d:"获得 128 方块",f:s=>s.max>=128},{id:"512",t:"渐入佳境",d:"获得 512 方块",f:s=>s.max>=512},{id:"2048",t:"真正的 2048",d:"获得 2048 方块",f:s=>s.max>=2048},{id:"combo3",t:"连击达人",d:"达到 3 连击",f:s=>s.bestCombo>=3},{id:"score10k",t:"万分选手",d:"单局达到 10000 分",f:s=>s.score>=10000},{id:"daily",t:"每日挑战者",d:"完成每日挑战目标",f:s=>s.dailyDone},{id:"size6",t:"大棋盘探索者",d:"开始一局 6×6",f:s=>s.size6}];
const $=id=>document.getElementById(id);const E={board:$("board"),grid:$("grid"),tiles:$("tiles"),particles:$("particleLayer"),score:$("score"),best:$("best"),max:$("maxTile"),bestCombo:$("bestCombo"),combo:$("comboBadge"),mode:$("modeBadge"),size:$("sizeSelect"),skin:$("skinSelect"),newBtn:$("newGameBtn"),undo:$("undoBtn"),daily:$("dailyBtn"),sound:$("soundBtn"),name:$("playerName"),submit:$("submitScoreBtn"),ach:$("achievementList"),leaders:$("leaderboard"),dailyInfo:$("dailyInfo"),dailyProgress:$("dailyProgress"),status:$("status"),overlay:$("overlay"),overlayTitle:$("overlayTitle"),overlayText:$("overlayText"),overlayRestart:$("overlayRestart")};
let best=+localStorage.getItem(STORE.BEST)||0, unlocked=JSON.parse(localStorage.getItem(STORE.ACH)||"[]"), leaders=JSON.parse(localStorage.getItem(STORE.BOARD)||"[]"), soundOn=localStorage.getItem(STORE.SOUND)!=="off", skin=localStorage.getItem(STORE.SKIN)||"classic", audio=null;
let state={};
function empty(n){return Array.from({length:n},()=>Array(n).fill(0))}function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}function hash(s){let h=2166136261;for(const c of s){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}function rng(seed){return()=>{let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function start(daily=false){const n=daily?4:+E.size.value;state={size:n,board:empty(n),score:0,combo:0,bestCombo:+localStorage.getItem(STORE.COMBO)||0,max:2,merges:0,over:false,prev:null,daily,dailyDone:false,size6:n===6,random:daily?rng(hash(today())):Math.random};addTile();addTile();E.overlay.classList.add("hidden");render();checkAch();setStatus(daily?"每日挑战已开始。":`${n}×${n} 新游戏已开始。`)}
function snapshot(){state.prev={board:state.board.map(r=>[...r]),score:state.score,combo:state.combo,bestCombo:state.bestCombo,max:state.max,merges:state.merges,dailyDone:state.dailyDone}}
function undo(){if(!state.prev||state.over)return setStatus("当前没有可撤销的步骤。");Object.assign(state,{board:state.prev.board.map(r=>[...r]),score:state.prev.score,combo:state.prev.combo,bestCombo:state.prev.bestCombo,max:state.prev.max,merges:state.prev.merges,dailyDone:state.prev.dailyDone,prev:null});tone("undo");render();setStatus("已撤销上一步。")}function transpose(m){return m[0].map((_,c)=>m.map(r=>r[c]))}function reverse(m){return m.map(r=>[...r].reverse())}
function view(dir){if(dir==="left")return{read:m=>m.map(r=>[...r]),write:m=>m};if(dir==="right")return{read:reverse,write:reverse};if(dir==="up")return{read:transpose,write:transpose};return{read:m=>reverse(transpose(m)),write:m=>transpose(reverse(m))}}
function move(dir){if(state.over)return;snapshot();const before=JSON.stringify(state.board),v=view(dir),rows=v.read(state.board);let merges=0,gain=0;const out=rows.map(row=>{const a=row.filter(Boolean),b=[];for(let i=0;i<a.length;){if(a[i]===a[i+1]){const x=a[i]*2;b.push(x);gain+=x;merges++;i+=2}else b.push(a[i++])}while(b.length<state.size)b.push(0);return b});state.board=v.write(out);if(JSON.stringify(state.board)===before){state.prev=null;tone("blocked");return}if(merges){state.combo++;const mult=1+Math.min(state.combo-1,5)*.25;state.score+=Math.round(gain*mult);state.merges+=merges;state.bestCombo=Math.max(state.bestCombo,state.combo);localStorage.setItem(STORE.COMBO,state.bestCombo);E.combo.classList.remove("active");void E.combo.offsetWidth;E.combo.classList.add("active");tone("merge",state.combo);particles(merges)}else{state.combo=0;tone("move")}addTile();derive();checkAch();checkDaily();checkOver();render()}
function addTile(){const a=[];state.board.forEach((r,i)=>r.forEach((x,j)=>{if(!x)a.push([i,j])}));if(!a.length)return false;const [i,j]=a[Math.floor(state.random()*a.length)];state.board[i][j]=state.random()<.9?2:4;return true}function derive(){state.max=Math.max(...state.board.flat());best=Math.max(best,state.score);localStorage.setItem(STORE.BEST,best)}function available(){if(state.board.flat().includes(0))return true;for(let i=0;i<state.size;i++)for(let j=0;j<state.size;j++){const x=state.board[i][j];if(i+1<state.size&&state.board[i+1][j]===x)return true;if(j+1<state.size&&state.board[i][j+1]===x)return true}return false}function checkOver(){if(available())return;state.over=true;tone("over");show("游戏结束",`最终得分 ${state.score}，最大方块 ${state.max}。`)}function checkDaily(){if(state.daily&&!state.dailyDone&&state.max>=2048){state.dailyDone=true;tone("ach");setStatus("每日挑战完成：成功合成 2048！")}}
function checkAch(){let changed=false;ACH.forEach(a=>{if(!unlocked.includes(a.id)&&a.f(state)){unlocked.push(a.id);changed=true;tone("ach");setStatus(`解锁成就：${a.t}`)}});if(changed)localStorage.setItem(STORE.ACH,JSON.stringify(unlocked));renderAch()}
function submit(){const name=E.name.value.trim()||"匿名玩家";leaders.push({name,score:state.score,size:state.size,mode:state.daily?"每日":"普通",date:new Date().toLocaleDateString("zh-CN")});leaders.sort((a,b)=>b.score-a.score);leaders=leaders.slice(0,20);localStorage.setItem(STORE.BOARD,JSON.stringify(leaders));renderLeaders();setStatus("当前成绩已提交到本地排行榜。");tone("ach")}
function applySkin(name){skin=name;localStorage.setItem(STORE.SKIN,name);document.documentElement.style.setProperty("--board",SKINS[name].board);document.documentElement.style.setProperty("--cell",SKINS[name].cell);document.documentElement.style.setProperty("--accent",SKINS[name].accent);render()}function tileColor(v){return SKINS[skin].tiles[v]||`hsl(${Math.log2(v)*31%360} 78% 58%)`}
function ensureAudio(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();if(audio.state==="suspended")audio.resume()}function beep(f,d=.1,type="sine",vol=.035,delay=0){if(!soundOn)return;ensureAudio();const o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=f;g.gain.value=vol;o.connect(g);g.connect(audio.destination);const t=audio.currentTime+delay;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.start(t);o.stop(t+d)}function tone(k,c=1){if(k==="move")beep(180,.07,"triangle",.02);if(k==="merge"){beep(260+c*35,.12);beep(420+c*28,.16,"triangle",.03,.04)}if(k==="blocked")beep(110,.05,"square",.012);if(k==="undo")beep(220,.12);if(k==="ach"){beep(523,.15);beep(659,.18,"sine",.04,.08);beep(784,.22,"sine",.04,.16)}if(k==="over"){beep(220,.2,"sawtooth",.025);beep(165,.28,"sawtooth",.025,.15)}}
function particles(n){const rect=E.board.getBoundingClientRect(),cx=rect.width/2,cy=rect.height/2,total=Math.min(40,10+n*8);for(let i=0;i<total;i++){const p=document.createElement("span");p.className="particle";p.style.left=`${cx+(Math.random()-.5)*rect.width*.35}px`;p.style.top=`${cy+(Math.random()-.5)*rect.height*.35}px`;p.style.background=SKINS[skin].accent;p.style.setProperty("--dx",`${(Math.random()-.5)*180}px`);p.style.setProperty("--dy",`${(Math.random()-.7)*180}px`);E.particles.appendChild(p);setTimeout(()=>p.remove(),750)}}
function render(){renderBoard();E.score.textContent=state.score.toLocaleString();E.best.textContent=best.toLocaleString();E.max.textContent=state.max.toLocaleString();E.bestCombo.textContent=state.bestCombo;E.combo.textContent=`连击 ×${state.combo}`;E.mode.textContent=`${state.daily?"每日挑战":"普通模式"} · ${state.size}×${state.size}`;E.undo.disabled=!state.prev;renderAch();renderLeaders();renderDaily()}
function renderBoard(){const n=state.size,g=n>=6?6:n===5?8:10;[E.grid,E.tiles].forEach(x=>{x.style.gridTemplateColumns=`repeat(${n},1fr)`;x.style.gridTemplateRows=`repeat(${n},1fr)`;x.style.gap=`${g}px`});E.grid.innerHTML="";E.tiles.innerHTML="";for(let i=0;i<n*n;i++){const c=document.createElement("div");c.className="cell";E.grid.appendChild(c)}state.board.forEach((r,i)=>r.forEach((v,j)=>{if(!v)return;const t=document.createElement("div");t.className="tile";t.textContent=v;t.style.gridRow=i+1;t.style.gridColumn=j+1;t.style.background=tileColor(v);t.style.fontSize=`${Math.max(15,42-String(v).length*4-n*1.8)}px`;t.style.color=v<=4&&skin!=="neon"?"#334155":"#f8fafc";E.tiles.appendChild(t)}))}
function renderAch(){E.ach.innerHTML="";ACH.forEach(a=>{const ok=unlocked.includes(a.id),d=document.createElement("div");d.className=`item achievement ${ok?"unlocked":"locked"}`;d.innerHTML=`<strong>${ok?"✓":"○"} ${a.t}</strong><div style="color:var(--muted);margin-top:4px">${a.d}</div>`;E.ach.appendChild(d)})}function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}function renderLeaders(){E.leaders.innerHTML="";if(!leaders.length){E.leaders.innerHTML='<div class="item" style="color:var(--muted)">暂无成绩</div>';return}leaders.slice(0,10).forEach((x,i)=>{const d=document.createElement("div");d.className="item leader";d.innerHTML=`<strong>#${i+1}</strong><div><strong>${esc(x.name)}</strong><div style="color:var(--muted);margin-top:4px">${x.mode} · ${x.size}×${x.size}</div></div><span>${x.score}</span>`;E.leaders.appendChild(d)})}function renderDaily(){const pct=Math.min(100,Math.log2(Math.max(2,state.max))/11*100);E.dailyProgress.style.width=`${pct}%`;E.dailyInfo.innerHTML=`日期：${today()}<br>目标：合成 2048<br>当前：${state.max}<br>状态：${state.dailyDone?"已完成":"进行中"}`}function setStatus(t){E.status.textContent=t}function show(t,x){E.overlayTitle.textContent=t;E.overlayText.textContent=x;E.overlay.classList.remove("hidden")}
document.addEventListener("keydown",e=>{const m={ArrowLeft:"left",KeyA:"left",ArrowRight:"right",KeyD:"right",ArrowUp:"up",KeyW:"up",ArrowDown:"down",KeyS:"down"};if(m[e.code]){e.preventDefault();move(m[e.code])}else if(e.code==="KeyU"){e.preventDefault();undo()}});let touch=null;E.board.addEventListener("pointerdown",e=>touch={x:e.clientX,y:e.clientY});E.board.addEventListener("pointerup",e=>{if(!touch)return;const dx=e.clientX-touch.x,dy=e.clientY-touch.y;touch=null;if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;move(Math.abs(dx)>Math.abs(dy)?(dx>0?"right":"left"):(dy>0?"down":"up"))});E.newBtn.onclick=()=>start(false);E.undo.onclick=undo;E.daily.onclick=()=>start(true);E.overlayRestart.onclick=()=>start(state.daily);E.submit.onclick=submit;E.size.onchange=()=>start(false);E.skin.onchange=e=>applySkin(e.target.value);E.sound.onclick=()=>{soundOn=!soundOn;localStorage.setItem(STORE.SOUND,soundOn?"on":"off");E.sound.textContent=`音效：${soundOn?"开":"关"}`;if(soundOn)tone("move")};
function selfCheck(){const checks=[empty(4).length===4&&empty(4).every(r=>r.length===4),Object.keys(SKINS).length===4,ACH.length===8,Array.isArray(leaders),typeof rng(1)==="function"];if(checks.every(Boolean))console.info("[2048 自检通过] 棋盘、皮肤、成就、排行榜、每日随机");else{console.error("[2048 自检失败]",checks);setStatus("检测到初始化异常，请查看控制台。")}}
E.skin.value=skin;E.sound.textContent=`音效：${soundOn?"开":"关"}`;applySkin(skin);start(false);selfCheck();
</script>
</body>
</html>
